<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Página Inicial</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Cabeçalho com iniciais e menu -->
    <header>
        <div class="header-container">
            <div class="logo">
                <img src="img/GM.png" alt="GM" class="author-logo">
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#inicio">Início</a></li>
                    <li><a href="#sobre">Sobre</a></li>
                    <li><a href="#projetos">Projetos</a></li>
                    <li><a href="#tecnologias">Tecnologias</a></li>
                </ul>
            </nav>
            <div class="language-selector">
                <select id="language-select">
                    <option value="pt">Português</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Primeira seção - Início -->
    <section class="section reveal" id="inicio">
        <div class="author-info">
            <h2>Gabriel Matheus Oliveira</h2>
            <p id="role">Desenvolvedor web <span id="dynamic-text"></span></p>
            
            <!-- Botão para download do CV -->
            <a href="docs/curriculo_gabriel.pdf" class="download-btn" download>Download CV</a>
        </div>
        <img src="img/foto.png" alt="Gabriel Matheus" class="author-photo">
        <div class="social-icons">
            <a href="https://linkedin.com/in/oliveiragm" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/GabMatheus" target="_blank"><i class="fab fa-github"></i></a>
            <a href="mailto:gab_matheus@hotmail.com" target="_blank"><i class="fas fa-envelope"></i></a>
        </div>
    </section>

    <!-- Segunda seção - Sobre -->
    <section class="section reveal" id="sobre">
        <h2>Sobre Mim</h2>
        <div id="sobre-content">
            <p>Carregando informações...</p>
        </div>
    </section>

    <!-- Terceira seção - Projetos -->
    <section class="section reveal" id="projetos">
        <h2>Meus Projetos</h2>
        <div id="projetos-content">
            <p>Carregando projetos...</p>
        </div>
    </section>

    <section class="section reveal" id="tecnologias">
        <h2>Tecnologias</h2>
        <div id="tecnologias-content" class="tech-grid">
            <!-- Os itens serão carregados dinamicamente aqui -->
        </div>
    </section>

    <!-- Quinta seção - Rodapé -->
    <footer id="rodape">
        <p>Todos os direitos reservados © 2024 - Gabriel Matheus Oliveira</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
